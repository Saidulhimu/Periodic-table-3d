<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Periodic Table</title>
    <link rel="icon" type="" href="./images/gemini-svg.svg">

    <!-- Technical mono face for data + a display face for headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- App styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="bg"></div>

    <!-- ============================== HUD ============================== -->
    <div id="hud">
        <div class="brand">
            <h1>ATOMIC <span>LATTICE</span></h1>
            <p><b>3D Periodic Table</b></p>
        </div>
        <div id="modes">
            <button class="mode-btn active" data-mode="table">Table</button>
            <button class="mode-btn" data-mode="sphere">Sphere</button>
            <button class="mode-btn" data-mode="helix">Helix</button>
            <button class="mode-btn" data-mode="grid">Grid</button>
        </div>
    </div>

    <div id="legend"></div>
    <div id="hint">Drag to rotate · Scroll to zoom · Click a card for details</div>

    <!-- ============================ FOOTER ============================ -->
    <footer id="site-footer">
        <div class="footer-inner">
            <!-- Animated atom logo: nucleus + three rotating electron orbits -->
            <svg class="atom-logo" viewBox="0 0 60 60" aria-hidden="true">
                <circle class="nucleus" cx="30" cy="30" r="4.5"></circle>
                <ellipse class="orbit orbit-1" cx="30" cy="30" rx="26" ry="10"></ellipse>
                <ellipse class="orbit orbit-2" cx="30" cy="30" rx="26" ry="10"></ellipse>
                <ellipse class="orbit orbit-3" cx="30" cy="30" rx="26" ry="10"></ellipse>
            </svg>

            <span class="footer-text">Atomic Lattice — built by Saidul Himu</span>

            <div class="footer-links">
                <a class="footer-link" href="mailto:saidulhimuu@gmail.com">
                    <svg viewBox="0 0 24 24" class="icon">
                        <path
                            d="M2 5.5A2.5 2.5 0 0 1 4.5 3h15A2.5 2.5 0 0 1 22 5.5v13a2.5 2.5 0 0 1-2.5 2.5h-15A2.5 2.5 0 0 1 2 18.5v-13Zm2.2.3 7.4 5.9a.8.8 0 0 0 1 0l7.4-5.9a.6.6 0 0 0-.4-.8H4.6a.6.6 0 0 0-.4.8Z" />
                    </svg>
                    saidulhimuu@gmail.com
                </a>
                <span class="footer-sep">·</span>
                <a class="footer-link" href="https://github.com/Saidulhimu" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" class="icon">
                        <path
                            d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.95 0-1.1.39-2 1.03-2.7-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.4 9.4 0 0 1 5 0c1.91-1.3 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.6 1.03 2.7 0 3.85-2.34 4.7-4.57 4.94.36.31.68.92.68 1.85v2.75c0 .26.18.58.69.48A10 10 0 0 0 12 2Z" />
                    </svg>
                    github.com/Saidulhimu
                </a>
            </div>
        </div>
    </footer>

    <!-- ============================ 3D STAGE ============================ -->
    <div id="stage"></div>

    <!-- ============================ DETAIL MODAL ============================ -->
    <div id="modal-overlay">
        <div id="modal">
            <button class="close" aria-label="Close">✕</button>
            <span class="cat-tag" id="m-cat">Category</span>
            <div class="row">
                <div class="big-sym" id="m-sym">H</div>
                <div class="name-num">
                    <div class="m-name" id="m-name">Hydrogen</div>
                    <div class="m-num" id="m-num">Element 1</div>
                </div>
            </div>
            <div class="facts">
                <div class="fact"><label>Atomic Mass</label><span id="m-mass">1.008</span></div>
                <div class="fact"><label>Category</label><span id="m-cat2">Nonmetal</span></div>
                <div class="fact"><label>Period (Row)</label><span id="m-row">1</span></div>
                <div class="fact"><label>Group (Column)</label><span id="m-col">1</span></div>
            </div>
        </div>
    </div>

    <!-- ============================ LIBRARIES ============================ -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <!-- App logic -->
    <script src="./script.js"></script>
</body>

</html>
