<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>

<!-- Technical mono face for data + a display face for headings -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<!-- App styles -->
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="bg"></div>

<!-- ============================== HUD ============================== -->
<div id="hud">
  <div class="brand">
    <h1>ATOMIC <span>LATTICE</span></h1>
    <p>Interactive 3D Periodic Table</p>
  </div>
  <div id="modes">
    <button class="mode-btn active" data-mode="table">Table</button>
    <button class="mode-btn" data-mode="sphere">Sphere</button>
    <button class="mode-btn" data-mode="helix">Helix</button>
    <button class="mode-btn" data-mode="grid">Grid</button>
  </div>
</div>

<div id="legend"></div>
<div id="hint">Drag to rotate · Scroll to zoom · Click a card for details</div>

<!-- ============================ 3D STAGE ============================ -->
<div id="stage"></div>

<!-- ============================ DETAIL MODAL ============================ -->
<div id="modal-overlay">
  <div id="modal">
    <button class="close" aria-label="Close">✕</button>
    <span class="cat-tag" id="m-cat">Category</span>
    <div class="row">
      <div class="big-sym" id="m-sym">H</div>
      <div class="name-num">
        <div class="m-name" id="m-name">Hydrogen</div>
        <div class="m-num" id="m-num">Element 1</div>
      </div>
    </div>
    <div class="facts">
      <div class="fact"><label>Atomic Mass</label><span id="m-mass">1.008</span></div>
      <div class="fact"><label>Category</label><span id="m-cat2">Nonmetal</span></div>
      <div class="fact"><label>Period (Row)</label><span id="m-row">1</span></div>
      <div class="fact"><label>Group (Column)</label><span id="m-col">1</span></div>
    </div>
  </div>
</div>

<!-- ============================ LIBRARIES ============================ -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<!-- App logic -->
<script src="./script.js"></script>
</body>
</html>
