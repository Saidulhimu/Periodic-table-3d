<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Card -->
  <rect width="100" height="100" rx="22" fill="#0b0f19"/>
  <rect x="5" y="5" width="90" height="90" rx="18" fill="none" stroke="#00f3ff" stroke-width="2" opacity="0.3"/>
  
  <!-- 3D Atom Orbits -->
  <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#00f3ff" stroke-width="3" transform="rotate(-30 50 50)" opacity="0.8"/>
  <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#00ff88" stroke-width="3" transform="rotate(30 50 50)" opacity="0.8"/>
  
  <!-- Orbit Electrons -->
  <circle cx="22" cy="34" r="4" fill="#00ff88"/>
  <circle cx="78" cy="66" r="4" fill="#00f3ff"/>
  
  <!-- Center Text -->
  <text x="50" y="58" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="26" fill="#ffffff" text-anchor="middle">3D</text>
</svg>
