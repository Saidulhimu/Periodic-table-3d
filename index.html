<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>

<!-- Technical mono face for data + a display face for headings -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>

  :root{
    --void:        #04070a;
    --void-2:      #060c11;
    --panel:       rgba(12, 22, 28, 0.55);
    --panel-solid: #0b151b;
    --glass-border:rgba(140, 255, 225, 0.14);
    --cyan:        #2be8ff;
    --green:       #3dffa2;
    --text-hi:     #e8f6f4;
    --text-mid:    #9fb8bb;
    --text-dim:    #5c7377;

    --cat-alkali:      #ff5f6d;
    --cat-alkaline:    #ff9f5b;
    --cat-transition:  #ffd166;
    --cat-post:        #4de6a8;
    --cat-metalloid:   #4ecdd4;
    --cat-nonmetal:    #3dffa2;
    --cat-halogen:     #2be8ff;
    --cat-noble:       #8a7bff;
    --cat-lanthanide:  #ff7fd8;
    --cat-actinide:    #c98bff;
    --cat-unknown:     #7c8b90;

    --font-display: 'Space Grotesk', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;
  }

  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--void);
    color: var(--text-hi);
    font-family: var(--font-mono);
    overflow:hidden;
  }

  /* Faint technical grid + vignette behind everything */
  #bg{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(43,232,255,0.07), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(61,255,162,0.06), transparent 55%),
      linear-gradient(var(--void-2), var(--void-2));
  }
  #bg::before{
    content:''; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(140,255,225,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,255,225,0.045) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 50% 40%, black 0%, transparent 75%);
  }

  /* ======================================================================
     3D STAGE — the CSS3DRenderer canvas lives here
     ====================================================================== */
  #stage{ position:fixed; inset:0; z-index:1; }

  /* ======================================================================
     HEADER / HUD CHROME
     ====================================================================== */
  #hud{
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 28px;
    pointer-events:none;
  }
  #hud .brand{ pointer-events:auto; }
  #hud .brand h1{
    margin:0; font-family:var(--font-display); font-weight:700;
    font-size:20px; letter-spacing:0.12em; color:var(--text-hi);
    text-shadow:0 0 18px rgba(43,232,255,0.35);
  }
  #hud .brand h1 span{ color:var(--cyan); }
  #hud .brand p{
    margin:2px 0 0; font-size:11px; letter-spacing:0.08em;
    color:var(--text-dim); text-transform:uppercase;
  }

  /* View-mode switcher, top-right, styled as HUD buttons with corner ticks */
  #modes{
    pointer-events:auto;
    display:flex; gap:10px;
  }
  .mode-btn{
    position:relative;
    background: var(--panel);
    border:1px solid var(--glass-border);
    color: var(--text-mid);
    font-family:var(--font-mono); font-size:11px; font-weight:500;
    letter-spacing:0.14em; text-transform:uppercase;
    padding:10px 16px;
    cursor:pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: color .2s ease, border-color .2s ease, box-shadow .2s ease, transform .15s ease;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }
  .mode-btn:hover{ color:var(--text-hi); border-color:rgba(43,232,255,0.5); transform:translateY(-1px); }
  .mode-btn.active{
    color: var(--void);
    background: linear-gradient(120deg, var(--cyan), var(--green));
    border-color: transparent;
    box-shadow: 0 0 22px rgba(43,232,255,0.45), 0 0 40px rgba(61,255,162,0.25);
    font-weight:700;
  }

  /* ======================================================================
     LEGEND — category color key, bottom-left
     ====================================================================== */
  #legend{
    position:fixed; left:20px; bottom:20px; z-index:10;
    background: var(--panel);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding:12px 14px;
    display:grid; grid-template-columns:repeat(2, auto); gap:6px 16px;
    font-size:10px; letter-spacing:0.04em; color:var(--text-mid);
    clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
    max-width: 320px;
  }
  #legend .item{ display:flex; align-items:center; gap:7px; white-space:nowrap; }
  #legend .swatch{ width:9px; height:9px; border-radius:2px; flex:none; box-shadow:0 0 6px currentColor; }

  /* Hint text bottom-right */
  #hint{
    position:fixed; right:20px; bottom:20px; z-index:10;
    font-size:10px; letter-spacing:0.06em; color:var(--text-dim);
    text-transform:uppercase; pointer-events:none; text-align:right;
    line-height:1.6;
  }

  /* ======================================================================
     ELEMENT CARDS
     These are real DOM nodes positioned in 3D space by CSS3DObject.
     ====================================================================== */
  .element{
    width:118px; height:158px;
    background: linear-gradient(160deg, rgba(20,34,40,0.65), rgba(8,14,18,0.75));
    border:1px solid var(--cat-color, var(--glass-border));
    border-radius:10px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 0 18px -6px var(--cat-color, transparent);
    display:flex; flex-direction:column; justify-content:space-between;
    padding:10px 11px;
    cursor:pointer;
    user-select:none; -webkit-user-select:none;
    transition: box-shadow .25s ease, border-color .25s ease;
  }
  .element:hover{
    border-color: var(--cat-color);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 0 30px -3px var(--cat-color);
  }
  .element .num{
    font-size:11px; color: var(--text-dim); letter-spacing:0.03em;
  }
  .element .sym{
    font-family:var(--font-display); font-weight:700;
    font-size:40px; line-height:1; color:var(--text-hi);
    text-shadow: 0 0 16px var(--cat-color, rgba(43,232,255,0.4));
  }
  .element .name{
    font-size:11px; color:var(--text-mid);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .element .mass{
    font-size:10px; color:var(--text-dim); text-align:right;
  }
  .element .dot{
    position:absolute; top:10px; right:11px;
    width:7px; height:7px; border-radius:50%;
    background:var(--cat-color); box-shadow:0 0 8px var(--cat-color);
  }
  .element{ position:relative; }

  /* ======================================================================
     DETAIL MODAL — shown when an element card is clicked
     ====================================================================== */
  #modal-overlay{
    position:fixed; inset:0; z-index:100;
    background: rgba(2,5,7,0.72);
    backdrop-filter: blur(4px);
    display:none; align-items:center; justify-content:center;
    animation: fadeIn .18s ease;
  }
  #modal-overlay.open{ display:flex; }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }

  #modal{
    width:340px;
    background: linear-gradient(160deg, rgba(18,32,38,0.9), rgba(6,11,14,0.95));
    border:1px solid var(--cat-color, var(--cyan));
    box-shadow: 0 0 60px -8px var(--cat-color, var(--cyan));
    border-radius:14px;
    padding:26px 26px 22px;
    position:relative;
    animation: pop .22s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes pop{ from{ transform:scale(.92); opacity:0 } to{ transform:scale(1); opacity:1 } }

  #modal .close{
    position:absolute; top:14px; right:16px;
    background:none; border:none; color:var(--text-dim);
    font-family:var(--font-mono); font-size:18px; cursor:pointer;
    line-height:1;
  }
  #modal .close:hover{ color:var(--text-hi); }

  #modal .cat-tag{
    display:inline-block; font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
    color: var(--cat-color); border:1px solid var(--cat-color);
    padding:3px 8px; border-radius:20px; margin-bottom:16px;
  }
  #modal .row{ display:flex; align-items:baseline; gap:18px; margin-bottom:6px; }
  #modal .big-sym{
    font-family:var(--font-display); font-weight:700; font-size:64px;
    color:var(--text-hi); text-shadow:0 0 30px var(--cat-color);
    line-height:1;
  }
  #modal .name-num{ display:flex; flex-direction:column; }
  #modal .m-name{ font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--text-hi); }
  #modal .m-num{ font-size:12px; color:var(--text-dim); margin-top:2px; }

  #modal .facts{
    margin-top:18px; padding-top:16px; border-top:1px solid var(--glass-border);
    display:grid; grid-template-columns:1fr 1fr; gap:12px 10px;
  }
  #modal .fact label{ display:block; font-size:9px; letter-spacing:0.1em; color:var(--text-dim); text-transform:uppercase; margin-bottom:3px; }
  #modal .fact span{ font-size:13px; color:var(--text-hi); }

  /* small screens */
  @media (max-width:640px){
    #hud{ flex-direction:column; align-items:flex-start; gap:12px; }
    #modes{ flex-wrap:wrap; }
    #legend{ display:none; }
  }
</style>
</head>
<body>

<div id="bg"></div>

<!-- ============================== HUD ============================== -->
<div id="hud">
  <div class="brand">
    <h1>ATOMIC <span>LATTICE</span></h1>
    <p>Interactive 3D Periodic Table</p>
  </div>
  <div id="modes">
    <button class="mode-btn active" data-mode="table">Table</button>
    <button class="mode-btn" data-mode="sphere">Sphere</button>
    <button class="mode-btn" data-mode="helix">Helix</button>
    <button class="mode-btn" data-mode="grid">Grid</button>
  </div>
</div>

<div id="legend"></div>
<div id="hint">Drag to rotate · Scroll to zoom · Click a card for details</div>

<!-- ============================ 3D STAGE ============================ -->
<div id="stage"></div>

<!-- ============================ DETAIL MODAL ============================ -->
<div id="modal-overlay">
  <div id="modal">
    <button class="close" aria-label="Close">✕</button>
    <span class="cat-tag" id="m-cat">Category</span>
    <div class="row">
      <div class="big-sym" id="m-sym">H</div>
      <div class="name-num">
        <div class="m-name" id="m-name">Hydrogen</div>
        <div class="m-num" id="m-num">Element 1</div>
      </div>
    </div>
    <div class="facts">
      <div class="fact"><label>Atomic Mass</label><span id="m-mass">1.008</span></div>
      <div class="fact"><label>Category</label><span id="m-cat2">Nonmetal</span></div>

      <div class="fact"><label>Group (Column)</label><span id="m-col">1</span></div>
    </div>
  </div>
</div>

const CATEGORY_LABEL = {
  alkali:"Alkali Metal", alkaline:"Alkaline Earth Metal", transition:"Transition Metal",
  post:"Post-Transition Metal", metalloid:"Metalloid", nonmetal:"Reactive Nonmetal",
  halogen:"Halogen", noble:"Noble Gas", lanthanide:"Lanthanide", actinide:"Actinide",
  unknown:"Unknown Properties"
};
const CATEGORY_VAR = {
  alkali:"--cat-alkali", alkaline:"--cat-alkaline", transition:"--cat-transition",
  post:"--cat-post", metalloid:"--cat-metalloid", nonmetal:"--cat-nonmetal",
  halogen:"--cat-halogen", noble:"--cat-noble", lanthanide:"--cat-lanthanide",
  actinide:"--cat-actinide", unknown:"--cat-unknown"
};

/* =========================================================================
   BUILD LEGEND
   ========================================================================= */
(function buildLegend(){
  const legend = document.getElementById('legend');
  const rootStyles = getComputedStyle(document.documentElement);
  Object.keys(CATEGORY_LABEL).forEach(key=>{
    const color = rootStyles.getPropertyValue(CATEGORY_VAR[key]).trim();
    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `<span class="swatch" style="background:${color};color:${color}"></span>${CATEGORY_LABEL[key]}`;
    legend.appendChild(item);
  });
})();

/* =========================================================================
   THREE.JS SCENE SETUP (CSS3DRenderer)
   ========================================================================= */
let camera, scene, renderer, controls;
const objects = [];               // CSS3DObject instances, one per element
const targets = { table:[], sphere:[], helix:[], grid:[] };

init();
animate();

function init(){
  const stage = document.getElementById('stage');

  camera = new THREE.PerspectiveCamera( 40, window.innerWidth/window.innerHeight, 1, 10000 );
  camera.position.z = 3000;

  scene = new THREE.Scene();

  // ---- Build one CSS3DObject per element -------------------------------
  ELEMENTS.forEach(data=>{
    const [num, sym, name, mass, cat, row, col] = data;

    const el = document.createElement('div');
    el.className = 'element';
    el.style.setProperty('--cat-color', `var(${CATEGORY_VAR[cat]})`);

    el.innerHTML = `
      <div class="dot"></div>
      <div class="num">${num}</div>
      <div class="sym">${sym}</div>
      <div class="name">${name}</div>
      <div class="mass">${mass}</div>
    `;

    // Distinguish a genuine click from a drag-to-rotate gesture: only open
    // the detail modal if the pointer barely moved between down and up.
    let downX = 0, downY = 0;
    el.addEventListener('pointerdown', e=>{ downX = e.clientX; downY = e.clientY; });
    el.addEventListener('pointerup', e=>{
      const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
      if (moved < 4) openDetail(data);
    });

    const object = new THREE.CSS3DObject(el);
    // Initial placement = table layout so the first frame is correct.
    object.position.x = ( col * 140 ) - 1330;
    object.position.y = - ( row + (row >= 9 ? 0.6 : 0) ) * 180 + 990;
    object.position.z = 0;
    scene.add(object);
    objects.push(object);
  });

  computeAllTargets();

  renderer = new THREE.CSS3DRenderer();
  renderer.setSize( window.innerWidth, window.innerHeight );
  stage.appendChild( renderer.domElement );

  controls = new THREE.OrbitControls( camera, renderer.domElement );
  controls.rotateSpeed = 0.6;
  controls.minDistance = 600;
  controls.maxDistance = 6000;
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  window.addEventListener('resize', onWindowResize);

  // ---- View mode buttons -------------------------------------------------
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      transform( targets[btn.dataset.mode], 1600 );
    });
  });

  // ---- Modal close handlers ----------------------------------------------
  const overlay = document.getElementById('modal-overlay');
  overlay.addEventListener('click', e=>{ if (e.target === overlay) closeDetail(); });
  document.querySelector('#modal .close').addEventListener('click', closeDetail);
  window.addEventListener('keydown', e=>{ if (e.key === 'Escape') closeDetail(); });
}

/* =========================================================================
   LAYOUT TARGET COMPUTATION
   Each layout is expressed as an array of THREE.Object3D "ghost" targets
   (position + rotation only) that objects are tweened toward.
   ========================================================================= */
function computeAllTargets(){

  // ---- 1. TABLE: standard 2D periodic-table grid ------------------------
  ELEMENTS.forEach((data,i)=>{
    const [,,,,, row, col] = data;
    const o = new THREE.Object3D();
    o.position.x = ( col * 140 ) - 1330;
    o.position.y = - ( row + (row >= 9 ? 0.6 : 0) ) * 180 + 990;
    o.position.z = 0;
    targets.table.push(o);
  });

  // ---- 2. SPHERE: even Fibonacci-style distribution on a sphere ---------
  const vector = new THREE.Vector3();
  ELEMENTS.forEach((data,i)=>{
    const phi   = Math.acos( -1 + ( 2 * i ) / ELEMENTS.length );
    const theta = Math.sqrt( ELEMENTS.length * Math.PI ) * phi;
    const o = new THREE.Object3D();
    o.position.setFromSphericalCoords( 900, phi, theta );
    vector.copy( o.position ).multiplyScalar( 2 );
    o.lookAt( vector );
    targets.sphere.push(o);
  });

  // ---- 3. HELIX: dual spiral wound around a vertical cylinder -----------
  ELEMENTS.forEach((data,i)=>{
    const theta = i * 0.35 + Math.PI;
    const y = - ( i * 8 ) + 450;
    const o = new THREE.Object3D();
    o.position.setFromCylindricalCoords( 950, theta, y );
    const vec = new THREE.Vector3( o.position.x * 2, o.position.y, o.position.z * 2 );
    o.lookAt( vec );
    targets.helix.push(o);
  });

  // ---- 4. GRID: 5x5x5 volumetric cube matrix -----------------------------
  ELEMENTS.forEach((data,i)=>{
    const o = new THREE.Object3D();
    o.position.x = ( ( i % 5 ) * 420 ) - 840;
    o.position.y = ( - Math.floor( i / 5 ) % 5 ) * 420 + 840;
    o.position.z = ( Math.floor( i / 25 ) ) * 420 - 840;
    targets.grid.push(o);
  });
}

/* =========================================================================
   ANIMATED TRANSITION BETWEEN LAYOUTS (Tween.js)
   ========================================================================= */
function transform( targetArray, duration ){
  TWEEN.removeAll();

  objects.forEach((object, i)=>{
    const target = targetArray[i];

    new TWEEN.Tween( object.position )
      .to( { x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration )
      .easing( TWEEN.Easing.Exponential.InOut )
      .start();

    new TWEEN.Tween( object.rotation )
      .to( { x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration )
      .easing( TWEEN.Easing.Exponential.InOut )
      .start();
  });
}

/* =========================================================================
   DETAIL MODAL
   ========================================================================= */
function openDetail(data){
  const [num, sym, name, mass, cat] = data;
  const [,,,,, row, col] = data;
  const rootStyles = getComputedStyle(document.documentElement);
  const color = rootStyles.getPropertyValue(CATEGORY_VAR[cat]).trim();

  const modal = document.getElementById('modal');
  modal.style.setProperty('--cat-color', color);

  document.getElementById('m-sym').textContent  = sym;
  document.getElementById('m-name').textContent = name;
  document.getElementById('m-num').textContent  = `Element ${num}`;
  document.getElementById('m-mass').textContent = mass;
  document.getElementById('m-cat').textContent  = CATEGORY_LABEL[cat];
  document.getElementById('m-cat2').textContent = CATEGORY_LABEL[cat];
  document.getElementById('m-row').textContent  = row <= 7 ? row : (row === 9 ? '6 (f-block)' : '7 (f-block)');
  document.getElementById('m-col').textContent  = col;

  document.getElementById('modal-overlay').classList.add('open');
}
function closeDetail(){
  document.getElementById('modal-overlay').classList.remove('open');
}

/* =========================================================================
   RENDER LOOP
   ========================================================================= */
function animate(){
  requestAnimationFrame( animate );
  TWEEN.update();
  controls.update();
  renderer.render( scene, camera );
}

function onWindowResize(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize( window.innerWidth, window.innerHeight );
}
</script>
</body>
